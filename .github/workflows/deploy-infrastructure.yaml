name: 🚀 Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    environment: production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Look up Certificate ARN for firefly-acm
        id: lookup-cert
        run: |
          CERT_ARN=$(aws cloudformation describe-stacks \
            --stack-name firefly-acm \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" \
            --output text)

          echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT

      - name: Delete firefly-s3-docs if in ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name firefly-s3-docs \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "ROLLBACK_FAILED" ]; then
            echo "Stack is in $STATUS — deleting before redeploy"
            aws cloudformation delete-stack --stack-name firefly-s3-docs --region ${{ secrets.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name firefly-s3-docs --region ${{ secrets.AWS_REGION }}
          fi

      - name: Deploy s3-docs
        run: |
          sam deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file templates/s3-docs.yaml \
            --stack-name firefly-s3-docs \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides \
              BucketName=${{ secrets.S3_DOCS_BUCKET_NAME }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket ${{ secrets.S3_SAM_DEPLOYMENT_BUCKET_NAME }}

      - name: Deploy cloudfront-docs
        run: |
          sam deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file templates/cloudfront-docs.yaml \
            --stack-name firefly-cloudfront-docs \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides \
              DocsBucketName=${{ secrets.S3_DOCS_BUCKET_NAME }} \
              CertificateArn=${{ steps.lookup-cert.outputs.cert_arn }} \
              DocsDomain=${{ vars.DOCS_DOMAIN_NAME }} \
              HostedZoneId=${{ secrets.ROUTE_53_HOSTED_ZONE_ID }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket ${{ secrets.S3_SAM_DEPLOYMENT_BUCKET_NAME }}

  publish-docs:
    needs: deploy-infrastructure
    uses: ./.github/workflows/deploy-docs.yaml
    secrets: inherit
